<!doctype html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8">
  <title>Hacking</title>
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#1ff4cf',
            'background-light': '#e2e8f0',
            'background-dark': '#050a0a',
            'terminal-bg': '#0a1414'
          },
          fontFamily: {
            display: ['Orbitron', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          },
          borderRadius: {
            DEFAULT: '0px'
          }
        }
      }
    };
  </script>
</head>

<body style="display:none; user-select:none;">

  <script>
    // Flag global controlando visibilidade
    window.__NUI_VISIBLE = false;

    function showNui() {
      window.__NUI_VISIBLE = true;

      document.body.style.display = "block";
      document.body.classList.add("visible");

      // Reinicia todos audios nativos se existirem
      document.querySelectorAll("audio").forEach(a => {
        a.pause();
        a.currentTime = 0;
      });
    }

    function hideNui() {
      window.__NUI_VISIBLE = false;

      document.body.classList.remove("visible");
      document.body.style.display = "none";

      // Mata todos audios da página
      document.querySelectorAll("audio").forEach(a => {
        a.pause();
        a.currentTime = 0;
      });
    }

    window.addEventListener("message", function (event) {
      if (!event.data) return;

      if (event.data.action === "startHack") {
        showNui();
      }

      if (event.data.action === "forceClose") {
        hideNui();
      }
    });
  </script>

  <app-root></app-root>

</body>

</html>
