<!doctype html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <title>Hacking</title>
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#1ff4cf',
            'background-light': '#e2e8f0',
            'background-dark': '#050a0a',
            'terminal-bg': '#0a1414'
          },
          fontFamily: {
            display: ['Orbitron', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          },
          borderRadius: {
            DEFAULT: '0px'
          }
        }
      }
    };
  </script>
</head>
<body style="user-select: none;">
  <audio id="backgroundSound" autoplay loop>
    <source src="sounds/background.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  <script>
    // Audio volumes configuration
    window.audioVolumes = {
      'background': 0.22,
      'click-success': 0.16,
      'click-wrong': 0.6,
      'failure': 0.7,
      'victory': 0.8
    };
    
    const audio = document.getElementById('backgroundSound');
    audio.volume = window.audioVolumes['background'];
    
    // Block right-click context menu
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      return false;
    });
  </script>
  <app-root></app-root>
</body>
</html>
